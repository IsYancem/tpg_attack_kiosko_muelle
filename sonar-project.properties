  **/windows/**,\
  **/linux/**,\
  **/macos/**,\
  **/.flutter-plugins,\
  **/.flutter-plugins-dependencies,\
  **/generated_plugin_registrant.dart

# 🧪 Exclusiones de cobertura
sonar.coverage.exclusions=\
