name: tpg_attack_kiosko_muelle
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  intl: ^0.20.2

  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_localization: ^0.3.3
  shared_preferences: ^2.5.3
  provider: ^6.1.5+1
  web_socket_channel: ^3.0.3
  flutter_dotenv: ^6.0.0
  socket_io_client: ^3.1.2
  http: ^1.4.0
  flutter_secure_storage: ^9.2.4
  dio: ^5.9.0
  window_manager: ^0.5.1
  window_size: ^0.1.0
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  loading_animation_widget: ^1.3.0
  lottie: ^3.3.1
  path_provider: ^2.1.5
  printing: ^5.14.2
  pdf: ^3.11.3
  async: ^2.13.0
  pretty_qr_code: ^3.5.0
  barcode: ^2.2.9
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0


flutter:

  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/animations/
    - assets/images/tpg_logo.png

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/logo_tpg_sinletras.png
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: center
  fullscreen: true

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_tpg_sinletras.png"
  adaptive_icon_background: "assets/images/logo_tpg_sinletras.png"  
